# Pekko HTTP server tuning for maximum throughput on 2-vCPU container.
# The server is started programmatically via Pekko HTTP's bindAndHandle().

pekko {
  http {
    server {
      # Maximum open connections (default 1024 — too low for benchmarking)
      max-connections = 2048

      # HTTP/1.1 pipelining: process up to N requests per connection without
      # waiting for each response. This is the single biggest throughput lever
      # for keep-alive benchmarks (wrk2 uses keep-alive). Default is 1.
      pipelining-limit = 32

      # TCP accept backlog — prevents connection refusals under burst load
      backlog = 8192

      # Timeouts tuned for benchmarking workloads
      idle-timeout = 60s
      request-timeout = 10s
      linger-timeout = 1 min
      bind-timeout = 5s

      # Disable verbose server header to save bytes per response
      server-header = ""
      transparent-head-requests = off

      # Socket options
      socket-options {
        tcp-no-delay = true
        so-reuse-address = true
      }

      # Parser
      parsing {
        max-content-length = 1m
        # Relaxed URI parsing — saves CPU on URL validation
        uri-parsing-mode = relaxed
      }

      preview {
        enable-http2 = no
      }
    }

    host-connection-pool {
      max-connections = 64
      max-open-requests = 256
    }
  }

  actor {
    # Default dispatcher: ForkJoinPool tuned for 2-vCPU container.
    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"

      fork-join-executor {
        # With 2 vCPUs: keep thread count modest to avoid context-switch overhead
        parallelism-min = 2
        parallelism-factor = 2.0
        parallelism-max = 8
        # LIFO scheduling: recently used threads have warmer CPU caches
        task-peeking-mode = LIFO
      }

      # Process up to 128 messages per actor mailbox run before yielding.
      # Higher = fewer context switches, better throughput on limited cores.
      throughput = 128
    }
  }
}