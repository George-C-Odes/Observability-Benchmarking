name: Java Coverage

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/java_coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/java_coverage.yml'

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: spring-tomcat
            module_dir: services/java/spring/jvm/tomcat
          - name: spring-netty
            module_dir: services/java/spring/jvm/netty
          - name: quarkus-jvm
            module_dir: services/java/quarkus/jvm
          - name: micronaut-jvm
            module_dir: services/java/micronaut/jvm
          - name: helidon-se-jvm
            module_dir: services/java/helidon/se/jvm
          - name: helidon-mp-jvm
            module_dir: services/java/helidon/mp/jvm
          - name: spark-jvm
            module_dir: services/java/spark/jvm
          - name: javalin-jvm
            module_dir: services/java/javalin/jvm
          - name: dropwizard-jvm
            module_dir: services/java/dropwizard/jvm
          - name: vertx-jvm
            module_dir: services/java/vertx/jvm
          - name: pekko-jvm
            module_dir: services/java/pekko/jvm
          - name: orchestrator
            module_dir: utils/orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: |
            services/java/**/jvm/**/pom.xml
            utils/orchestrator/pom.xml

      - name: Run tests with coverage
        id: build
        working-directory: ${{ matrix.module_dir }}
        run: mvn verify -B -q -Dcheckstyle.skip=true

      # ── Parse JaCoCo XML and write GitHub Step Summary ──
      - name: Generate coverage summary
        if: always() && !cancelled()
        env:
          MODULE_NAME: ${{ matrix.name }}
          MODULE_DIR: ${{ matrix.module_dir }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          python3 << 'PYEOF'
          import os, sys, xml.etree.ElementTree as ET

          module_name  = os.environ["MODULE_NAME"]
          module_dir   = os.environ["MODULE_DIR"]
          build_outcome = os.environ["BUILD_OUTCOME"]
          summary_file = os.environ["GITHUB_STEP_SUMMARY"]

          jacoco_xml = f"{module_dir}/target/site/jacoco/jacoco.xml"

          if not os.path.isfile(jacoco_xml):
              print(f"::warning::JaCoCo report not found at {jacoco_xml}")
              with open(summary_file, "a") as f:
                  f.write(f"### ⚠️ Coverage: {module_name}\n\n")
                  f.write("No JaCoCo report was generated. "
                          "Tests may have been skipped or failed before the report phase.\n")
              sys.exit(0)

          # Parse the JaCoCo XML — direct children of <report> are the aggregates
          tree = ET.parse(jacoco_xml)
          root = tree.getroot()

          counters = {}
          for counter in root.findall("counter"):
              ctype   = counter.get("type")
              missed  = int(counter.get("missed", "0"))
              covered = int(counter.get("covered", "0"))
              counters[ctype] = (missed, covered)

          def pct(missed, covered):
              total = missed + covered
              return "0.0" if total == 0 else f"{covered * 100 / total:.1f}"

          def ratio(missed, covered):
              total = missed + covered
              return 0.0 if total == 0 else covered / total

          metrics = [
              ("Instructions", "INSTRUCTION"),
              ("Branches",     "BRANCH"),
              ("Lines",        "LINE"),
              ("Methods",      "METHOD"),
          ]

          # Evaluate thresholds independently (haltOnFailure=false in Maven,
          # so build_outcome does not reflect coverage violations).
          LINE_MIN, BRANCH_MIN = 0.15, 0.10
          line_m, line_c = counters.get("LINE", (0, 0))
          br_m, br_c     = counters.get("BRANCH", (0, 0))
          thresholds_met = (ratio(line_m, line_c) >= LINE_MIN
                            and ratio(br_m, br_c) >= BRANCH_MIN)

          if build_outcome != "success":
              badge = "❌ Build failed"
          elif thresholds_met:
              badge = "✅ Thresholds passed"
          else:
              badge = "⚠️ Coverage below threshold — review required"

          with open(summary_file, "a") as f:
              f.write(f"### 📊 Coverage: {module_name}\n\n")
              f.write(f"**{badge}** · Minimum: 15% line, 10% branch\n\n")
              f.write("| Metric       | Covered | Missed | Total | Coverage |\n")
              f.write("|--------------|--------:|-------:|------:|---------:|\n")
              for label, ctype in metrics:
                  missed, covered = counters.get(ctype, (0, 0))
                  total = missed + covered
                  p = pct(missed, covered)
                  f.write(f"| {label} | {covered} | {missed} | {total} | {p}% |\n")
              f.write(f"\n> Report generated from `{jacoco_xml}`\n")

          # Fail this step when thresholds are not met (and the build itself
          # passed), so the coverage-gate job sees needs.coverage.result
          # != 'success' and requires manual reviewer approval.
          if build_outcome == "success" and not thresholds_met:
              print("::warning::Coverage below minimum thresholds "
                    "— reviewer approval required via Coverage Gate")
              sys.exit(1)
          PYEOF

      - name: Upload coverage report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-java-${{ matrix.name }}
          path: |
            ${{ matrix.module_dir }}/target/site/jacoco/
          retention-days: 30
          if-no-files-found: warn

  # ── Approval gate ──────────────────────────────────────────────────
  # Two mutually-exclusive jobs share the display name "Coverage Gate"
  # so a single branch-protection required check covers both paths:
  #
  #  • All matrix legs pass  → coverage-gate runs (no environment).
  #  • Any matrix leg fails  → coverage-gate-review runs, gated behind
  #    the 'coverage-review' environment which pauses the job until a
  #    designated reviewer approves in the Actions UI.
  #
  # Why two jobs instead of a conditional environment expression?
  # In GitHub Actions expressions `cond && '' || 'fallback'` always
  # resolves to 'fallback' because '' is falsy.  Two jobs with the
  # same display name sidestep this; GitHub treats skipped check runs
  # as neutral so only the running job matters for required checks.
  #
  # One-time setup (repo owner):
  #   Settings → Environments → New environment "coverage-review"
  #   → Required reviewers → add team or individuals.
  #   Then add "Coverage Gate" as a required status check in
  #   Settings → Branches → Branch protection rules.
  coverage-gate:
    name: Coverage Gate
    needs: coverage
    if: always() && !cancelled() && needs.coverage.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Gate result
        run: echo "✅ All coverage thresholds met"

  coverage-gate-review:
    name: Coverage Gate
    needs: coverage
    if: always() && !cancelled() && needs.coverage.result == 'failure'
    runs-on: ubuntu-latest
    environment: coverage-review
    steps:
      - name: Gate result
        run: echo "::notice::Coverage violations reviewed and approved."

