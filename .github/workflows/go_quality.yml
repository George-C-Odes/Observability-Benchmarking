name: Go Quality

# Scope: services/go/enhanced only.
# services/go/simple is a minimal reference implementation without linter
# config or tests — it receives CodeQL analysis but is intentionally excluded
# from golangci-lint quality checks.

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/go/enhanced/**'
      - 'scripts/pages/generate-go-quality-report.mjs'
      - 'scripts/pages/report-helpers.mjs'
      - '.github/workflows/go_quality.yml'
  push:
    branches:
      - main
    paths:
      - 'services/go/enhanced/**'
      - 'scripts/pages/generate-go-quality-report.mjs'
      - 'scripts/pages/report-helpers.mjs'
      - '.github/workflows/go_quality.yml'
  schedule:
    # Weekly scan — Monday at 06:00 UTC (staggered after CodeQL at 05:30).
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  quality:
    name: Lint, vet & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/go/enhanced
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: services/go/enhanced/go.mod
          cache-dependency-path: services/go/enhanced/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: services/go/enhanced
          # The action runs `golangci-lint run` by default after install.
          # We only want to install the binary here — the actual lint run
          # with JSON output happens in a later step so we can capture the
          # report.  Passing --help makes the default invocation exit 0
          # without linting (the documented workaround; v9 has no
          # skip-run / install-only option).
          args: --help

      - name: Print tool versions
        id: versions
        run: |
          go_ver="$(go version | awk '{print $3}')"
          lint_ver="$(golangci-lint version --short 2>&1 || echo unknown)"
          echo "Go: $go_ver"
          echo "golangci-lint: $lint_ver"
          echo "go=$go_ver"           >> "$GITHUB_OUTPUT"
          echo "golangci_lint=$lint_ver" >> "$GITHUB_OUTPUT"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        id: lint
        run: |
          # The config file (.golangci.yml) writes both colored-line-number
          # to stdout and JSON to golangci-lint-report.json in a single pass.
          golangci-lint run

      - name: Unit tests
        run: go test ./... -race -count=1

      - name: Build check
        run: go build ./cmd/server

      # ------------------------------------------------------------------
      # Quality report: generate an HTML report from the JSON output
      # captured during the lint step so the Pages workflow can host it
      # alongside the Qodana and Next.js reports.  Steps run with
      # `if: always()` so that a failing lint still produces a
      # downloadable report artifact.
      # ------------------------------------------------------------------


      - name: Set up Node.js (for report generation)
        if: always() && !cancelled()
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Generate quality report
        if: always() && !cancelled()
        env:
          GOLANGCI_LINT_VERSION: ${{ steps.versions.outputs.golangci_lint }}
          GO_VERSION: ${{ steps.versions.outputs.go }}
        run: node ../../../scripts/pages/generate-go-quality-report.mjs

      - name: Upload quality report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: quality-report-go
          path: services/go/enhanced/quality-report/
          retention-days: 30
          if-no-files-found: warn

