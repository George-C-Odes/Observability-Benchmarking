name: Deploy GitHub Pages

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main

  # Republish after successful main-branch quality runs so hosted reports stay current.
  workflow_run:
    workflows:
      - Qodana
      - Next.js Dashboard Quality
      - Django Python Quality
      - Go Enhanced Quality
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Keep only one Pages deployment active at a time without interrupting the run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Select source revision
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            echo "ref=$WR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$PUSH_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: docs

      - name: Set up Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site with Bundler and Jekyll
        shell: bash
        working-directory: ./docs
        env:
          JEKYLL_ENV: production
        run: |
          ruby --version

          # Ensure a Gemfile.lock is present so docs builds are reproducible.
          if [ ! -f Gemfile.lock ]; then
            echo "Error: docs/Gemfile.lock is missing. Please generate and commit it for reproducible GitHub Pages builds." >&2
            exit 1
          fi
          bundle exec jekyll build --destination ../_site

      - name: Resolve Qodana artifact source run
        id: qodana_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/pages/resolve-qodana-source.sh

      - name: Inspect available Qodana artifacts
        id: qodana_artifacts
        if: steps.qodana_source.outputs.run_id != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
        run: bash scripts/pages/inspect-qodana-artifacts.sh

      - name: Download Qodana report (services-java)
        id: download_qodana_services_java
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-services-java
          path: ./.qodana-pages/services-java
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Qodana report (orchestrator)
        id: download_qodana_orchestrator
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-orchestrator
          path: ./.qodana-pages/orchestrator
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Next.js Dashboard quality report (ESLint + TypeScript)
      # ----------------------------------------------------------------

      - name: Resolve Next.js quality artifact source run
        id: nextjs_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/pages/resolve-nextjs-quality-source.sh

      - name: Download Next.js quality report
        id: download_nextjs_quality
        if: steps.nextjs_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: quality-report-nextjs-dash
          path: ./.nextjs-quality-pages/nextjs-dash
          run-id: ${{ steps.nextjs_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Django Python quality report (Qodana Python Community)
      # ----------------------------------------------------------------

      - name: Resolve Django Python quality artifact source run
        id: django_python_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/pages/resolve-django-python-quality-source.sh

      - name: Download Django Python quality report
        id: download_django_python_quality
        if: steps.django_python_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-django-python
          path: ./.django-python-quality-pages/django-python
          run-id: ${{ steps.django_python_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Go Enhanced quality report (golangci-lint)
      # ----------------------------------------------------------------

      - name: Resolve Go Enhanced quality artifact source run
        id: go_enhanced_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/pages/resolve-go-enhanced-quality-source.sh

      - name: Download Go Enhanced quality report
        id: download_go_enhanced_quality
        if: steps.go_enhanced_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: quality-report-go-enhanced
          path: ./.go-enhanced-quality-pages/go-enhanced
          run-id: ${{ steps.go_enhanced_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble Qodana pages
        shell: bash
        env:
          SERVICES_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.services_java_present }}
          ORCHESTRATOR_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.orchestrator_present }}
          SERVICES_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_services_java.outcome }}
          ORCHESTRATOR_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_orchestrator.outcome }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
          QODANA_HEAD_SHA: ${{ steps.qodana_source.outputs.head_sha }}
          QODANA_PAGES_DIR: ./.qodana-pages
          NEXTJS_QUALITY_RUN_ID: ${{ steps.nextjs_quality_source.outputs.run_id }}
          NEXTJS_QUALITY_HEAD_SHA: ${{ steps.nextjs_quality_source.outputs.head_sha }}
          NEXTJS_DOWNLOAD_OUTCOME: ${{ steps.download_nextjs_quality.outcome }}
          NEXTJS_QUALITY_PAGES_DIR: ./.nextjs-quality-pages
          DJANGO_PYTHON_QUALITY_RUN_ID: ${{ steps.django_python_quality_source.outputs.run_id }}
          DJANGO_PYTHON_QUALITY_HEAD_SHA: ${{ steps.django_python_quality_source.outputs.head_sha }}
          DJANGO_PYTHON_DOWNLOAD_OUTCOME: ${{ steps.download_django_python_quality.outcome }}
          DJANGO_PYTHON_QUALITY_PAGES_DIR: ./.django-python-quality-pages
          GO_ENHANCED_QUALITY_RUN_ID: ${{ steps.go_enhanced_quality_source.outputs.run_id }}
          GO_ENHANCED_QUALITY_HEAD_SHA: ${{ steps.go_enhanced_quality_source.outputs.head_sha }}
          GO_ENHANCED_DOWNLOAD_OUTCOME: ${{ steps.download_go_enhanced_quality.outcome }}
          GO_ENHANCED_QUALITY_PAGES_DIR: ./.go-enhanced-quality-pages
          SITE_DIR: ./_site
        run: bash scripts/pages/assemble-qodana-pages.sh

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4

  # Deployment job
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
