name: Deploy GitHub Pages

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main

  # Republish after successful main-branch Qodana runs so hosted reports stay current.
  workflow_run:
    workflows:
      - Qodana
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Keep only one Pages deployment active at a time without interrupting the run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Select source revision
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            echo "ref=$WR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$PUSH_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: docs

      - name: Set up Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build site with Bundler and Jekyll
        shell: bash
        working-directory: ./docs
        env:
          JEKYLL_ENV: production
        run: |
          ruby --version

          # Ensure a Gemfile.lock is present so docs builds are reproducible.
          if [ ! -f Gemfile.lock ]; then
            echo "Error: docs/Gemfile.lock is missing. Please generate and commit it for reproducible GitHub Pages builds." >&2
            exit 1
          fi
          bundle exec jekyll build --destination ../_site

      - name: Resolve Qodana artifact source run
        id: qodana_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash scripts/pages/resolve-qodana-source.sh

      - name: Inspect available Qodana artifacts
        id: qodana_artifacts
        if: steps.qodana_source.outputs.run_id != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
        run: |
          response_file="$(mktemp)"
          if ! curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${QODANA_RUN_ID}/artifacts?per_page=100" \
            -o "$response_file"; then
            echo "services_java_present=unknown" >> "$GITHUB_OUTPUT"
            echo "orchestrator_present=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          artifact_statuses="$(python3 scripts/pages/inspect-qodana-artifacts.py "$response_file")"
          printf '%s\n' "$artifact_statuses" >> "$GITHUB_OUTPUT"

      - name: Download Qodana report (services-java)
        id: download_qodana_services_java
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-services-java
          path: ./.qodana-pages/services-java
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Qodana report (orchestrator)
        id: download_qodana_orchestrator
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-orchestrator
          path: ./.qodana-pages/orchestrator
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble Qodana pages
        shell: bash
        env:
          SERVICES_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.services_java_present }}
          ORCHESTRATOR_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.orchestrator_present }}
          SERVICES_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_services_java.outcome }}
          ORCHESTRATOR_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_orchestrator.outcome }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
          QODANA_HEAD_SHA: ${{ steps.qodana_source.outputs.head_sha }}
          QODANA_PAGES_DIR: ./.qodana-pages
          SITE_DIR: ./_site
        run: bash scripts/pages/assemble-qodana-pages.sh

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4

  # Deployment job
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
