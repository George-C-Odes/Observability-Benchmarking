name: Go Enhanced Quality

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/go/enhanced/**'
      - 'scripts/pages/generate-go-quality-report.mjs'
      - '.github/workflows/go_enhanced_quality.yml'
  push:
    branches:
      - main
    paths:
      - 'services/go/enhanced/**'
      - 'scripts/pages/generate-go-quality-report.mjs'
      - '.github/workflows/go_enhanced_quality.yml'

permissions:
  contents: read

jobs:
  quality:
    name: Lint, vet & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/go/enhanced
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: services/go/enhanced/go.mod
          cache-dependency-path: services/go/enhanced/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.1.6
          working-directory: services/go/enhanced
          # We only install here; the actual lint run with JSON output
          # happens in a later step so we can capture the report.
          args: --help

      - name: Print tool versions
        id: versions
        run: |
          go_ver="$(go version | awk '{print $3}')"
          lint_ver="$(golangci-lint version --short 2>&1 || echo unknown)"
          echo "Go: $go_ver"
          echo "golangci-lint: $lint_ver"
          echo "go=$go_ver"           >> "$GITHUB_OUTPUT"
          echo "golangci_lint=$lint_ver" >> "$GITHUB_OUTPUT"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        run: golangci-lint run

      - name: Unit tests
        run: go test ./... -race -count=1

      - name: Build check
        run: go build ./cmd/server

      # ------------------------------------------------------------------
      # Quality report: generate an HTML report from golangci-lint JSON
      # output so the Pages workflow can host it alongside the Qodana and
      # Next.js reports.  Steps run with `if: always()` so that a failing
      # lint still produces a downloadable report artifact.
      # ------------------------------------------------------------------

      - name: Generate golangci-lint JSON report
        if: always() && !cancelled()
        run: |
          # Run golangci-lint and write only JSON output to the report file.
          # Exit code semantics:
          #   0: no issues
          #   1: issues found (non-fatal for this reporting step)
          #  >1: tool/configuration error (should fail the job)
          exit_code=0
          golangci-lint run --out-format=json > golangci-lint-report.json || exit_code=$?
          if [ "$exit_code" -gt 1 ]; then
            echo "golangci-lint failed with exit code $exit_code" >&2
            exit "$exit_code"
          fi

      - name: Set up Node.js (for report generation)
        if: always() && !cancelled()
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Generate quality report
        if: always() && !cancelled()
        env:
          GOLANGCI_LINT_VERSION: ${{ steps.versions.outputs.golangci_lint }}
          GO_VERSION: ${{ steps.versions.outputs.go }}
        run: node ../../../scripts/pages/generate-go-quality-report.mjs

      - name: Upload quality report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: quality-report-go-enhanced
          path: services/go/enhanced/quality-report/
          retention-days: 30
          if-no-files-found: warn

