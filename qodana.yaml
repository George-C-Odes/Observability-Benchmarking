#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

#################################################################################
#              WARNING: Do not store sensitive information in this file,        #
#               as its contents will be included in the Qodana report.          #
#################################################################################
version: "1.0"

# Keep the analyzer image pinned in qodana.yaml so the action's `qodana pull`
# phase and later `qodana scan --skip-pull` phase resolve the same image.
image: jetbrains/qodana-jvm-community:2026.1

#Specify inspection profile for code analysis
profile:
  name: qodana.recommended
  inspections:
    - inspection: LocalVariableNamingConvention
      options:
        m_maxLength: 26
    - inspection: ParameterNamingConvention
      options:
        m_maxLength: 34
    - inspection: DuplicateStringLiteralInspection
      options:
        MIN_STRING_LENGTH: 24
        IGNORE_PROPERTY_KEYS: true
    - inspection: PackageNamingConvention
      enabled: true
      options:
        m_minLength: 2
        m_maxLength: 16
        m_regex: "[a-z]*"
    - inspection: ExtractMethodRecommender
      enabled: true
      options:
        minLength: 400
        maxParameters: 3
    - inspection: UnnecessaryFullyQualifiedName
      enabled: true
      severity: WEAK WARNING
    - inspection: OnDemandImport
      enabled: true
      severity: WEAK WARNING
    - inspection: unused
      enabled: true
      severity: WEAK WARNING
      options:
        LOCAL_VARIABLE: true
        FIELD: true
        METHOD: false
        CLASS: true
        PARAMETER: true
        REPORT_PARAMETER_FOR_PUBLIC_METHODS: false
        ADD_MAINS_TO_ENTRIES: true
        ADD_APPLET_TO_ENTRIES: true
        ADD_SERVLET_TO_ENTRIES: true
        ADD_NONJAVA_TO_ENTRIES: true
        field: private
        klass: private
        inner_class: private

include:
  - name: MissingJavadoc
  - name: PackageNamingConvention
  - name: ClassNamingConvention
  - name: MethodNamingConvention
  - name: FieldNamingConvention
  - name: ParameterNamingConvention
  - name: LocalVariableNamingConvention
  - name: TypeParameterNamingConvention
  - name: LoggingPlaceholderCountMatchesArgumentCount
  - name: StringConcatenationArgumentToLogCall
  - name: CallToPrintStackTrace
  - name: UseOfSystemOutOrSystemErr
  - name: OptionalGetWithoutIsPresent
  - name: BigDecimalMethodWithoutRoundingCalled
  - name: NullableProblems
  - name: DuplicateStringLiteralInspection
  - name: ClassCanBeRecord
  - name: ExtractMethodRecommender
    paths:
      - services/java
      - utils/orchestrator
  - name: UnnecessaryFullyQualifiedName
    paths:
      - services/java
      - utils/orchestrator
  - name: OnDemandImport
    paths:
      - services/java
      - utils/orchestrator

#Enable inspections
#include:
#  - name: <SomeEnabledInspectionId>

#Disable inspections
exclude:
  # The benchmark Java services already enforce their Javadoc policy via the
  # shared Checkstyle rules in `services/java/checkstyle.xml`, including the
  # project-specific test-source suppressions. Excluding the broader IDE-level
  # inspection here avoids duplicate/high-noise findings that do not reflect
  # the Java services' actual documentation contract.
  - name: MissingJavadoc
    paths:
      - services/java

projectJDK: "25" #(Applied in CI/CD pipeline)

#Execute shell command before Qodana execution (Applied in CI/CD pipeline)
#bootstrap: sh ./prepare-qodana.sh
bootstrap: |
  set -eu

  export MAVEN_USER_HOME=/data/cache/maven-user-home
  MAVEN_REPO_LOCAL=/data/cache/m2/repository
  MAVEN_SETTINGS=/data/project/.qodana/baseline/qodana-settings.xml
  FALLBACK_MVNW=/data/project/services/java/quarkus/native/mvnw

  if command -v mvn >/dev/null 2>&1; then
    MVN_BIN=$(command -v mvn)
  else
    MVN_BIN=$FALLBACK_MVNW
    if [ ! -x "$MVN_BIN" ]; then
      chmod +x "$MVN_BIN"
    fi
  fi

  detect_only_directory() {
    if [ -n "${QODANA_ONLY_DIRECTORY:-}" ]; then
      printf '%s\n' "$QODANA_ONLY_DIRECTORY"
      return
    fi

    for cmdline in /proc/[0-9]*/cmdline; do
      [ -r "$cmdline" ] || continue
      args=$(tr '\000' ' ' < "$cmdline" || true)
      case "$args" in
        *detect_only_directory*|*run_test_compile*)
          continue
          ;;
      esac
      case "$args" in
        *--only-directory=*)
          value=${args#*--only-directory=}
          printf '%s\n' "${value%% *}"
          return
          ;;
        *"--only-directory "*)
          value=${args#*--only-directory }
          printf '%s\n' "${value%% *}"
          return
          ;;
      esac
    done
  }

  run_test_compile() {
    pom=$1
    label=${pom#/data/project/}

    if [ ! -f "$pom" ]; then
      echo "Qodana bootstrap: skipping missing Maven project $label"
      return
    fi

    echo "Qodana bootstrap: compiling $label"
    if [ -f "$MAVEN_SETTINGS" ]; then
      "$MVN_BIN" -B -q -s "$MAVEN_SETTINGS" -DskipTests -Dmaven.repo.local="$MAVEN_REPO_LOCAL" -f "$pom" test-compile
    else
      "$MVN_BIN" -B -q -DskipTests -Dmaven.repo.local="$MAVEN_REPO_LOCAL" -f "$pom" test-compile
    fi
  }

  run_services_java_test_compile() {
    pom_list_file=$(mktemp)
    trap 'rm -f "$pom_list_file"' EXIT HUP INT TERM
    find /data/project/services/java -name pom.xml -print | LC_ALL=C sort > "$pom_list_file"

    while IFS= read -r pom; do
      [ -n "$pom" ] || continue
      run_test_compile "$pom"
    done < "$pom_list_file"

    rm -f "$pom_list_file"
    trap - EXIT HUP INT TERM
  }

  # Qodana executes this command from /data/project, and this repository has no
  # root pom.xml. Always pass -f so Maven targets the scanned module explicitly.
  only_directory=$(detect_only_directory)
  case "$only_directory" in
    utils/orchestrator|utils/orchestrator/*)
      run_test_compile /data/project/utils/orchestrator/pom.xml
      ;;
    services/java|services/java/*)
      run_services_java_test_compile
      ;;
    *)
      run_test_compile /data/project/utils/orchestrator/pom.xml
      run_services_java_test_compile
      ;;
  esac

#Install IDE plugins before Qodana execution (Applied in CI/CD pipeline)
#plugins:
#  - id: <plugin.id> #(plugin id can be found at https://plugins.jetbrains.com)

# Quality gate. Will fail the CI/CD pipeline if any condition is not met
# severityThresholds - configures maximum thresholds for different problem severities
# testCoverageThresholds - configures minimum code coverage on a whole project and newly added code
# Code Coverage is available in Ultimate and Ultimate Plus plans
failureConditions:
  severityThresholds:
    # Fail the CI on critical, high and moderate findings to harden quality gate
    critical: 0
    high: 0
    moderate: 0
  
#Qodana supports other languages, for example, Python, JavaScript, TypeScript, Go, C#, PHP
#For all supported languages see https://www.jetbrains.com/help/qodana/linters.html
# GitHub Actions keeps the repository root as the Qodana project so this
# shared configuration is applied, then scopes analysis to `services/java`
# and `utils/orchestrator` via `--only-directory` per job. Matching
# reviewed SARIF baselines can be supplied by the workflow from
# `.qodana/baseline/*.sarif.json` when they exist.
#
# Keep the JVM linter pinned here so both the action's `pull` step and
# the later scoped `scan` step resolve the same image in this mixed-language
# repository.
linter: jetbrains/qodana-jvm-community:2026.1