name: Qodana
env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/qodana_code_quality.yml'
      - 'qodana.yaml'
      - '.qodana/baseline/**'
  push:
    branches:
      - main
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/qodana_code_quality.yml'
      - 'qodana.yaml'
      - '.qodana/baseline/**'

jobs:
  qodana:
    name: Qodana (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: services-java
            source_dir: services/java
            baseline_file: .qodana/baseline/services-java.sarif.json
          - name: orchestrator
            source_dir: utils/orchestrator
            baseline_file: .qodana/baseline/orchestrator.sarif.json
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Prepare Qodana arguments
        id: qodana_args
        shell: bash
        env:
          SOURCE_DIR: ${{ matrix.source_dir }}
          BASELINE_FILE: ${{ matrix.baseline_file }}
        run: |
          args="--project-dir=. --only-directory=$SOURCE_DIR"

          if [[ -f "$BASELINE_FILE" ]]; then
            echo "Using Qodana baseline: $BASELINE_FILE"
            args="$args --baseline=$BASELINE_FILE"
          else
            echo "No Qodana baseline found at $BASELINE_FILE; running without a baseline."
          fi

          echo "args=$args" >> "$GITHUB_OUTPUT"
      - name: Qodana Scan
        uses: JetBrains/qodana-action@89eb4357efd2b52e639f3216e63edaf33b82622b # v2025.3.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: false
          use-annotations: true
          # The Qodana action pre-zips results before uploading, which makes
          # the artifact incompatible with download-artifact@v4+ (the Pages
          # workflow gets a nested ZIP instead of extracted files).  We keep
          # upload-result for full SARIF/log access under a distinct name and
          # add an explicit upload-artifact step below for the HTML report.
          upload-result: true
          artifact-name: qodana-results-${{ matrix.name }}
          results-dir: ${{ runner.temp }}/qodana/results
          push-fixes: 'none'
          args: ${{ steps.qodana_args.outputs.args }}

      # Explicit upload of the HTML report directory using upload-artifact@v4
      # so that the Pages workflow's download-artifact@v8 receives extracted
      # files (not the nested ZIP that the Qodana action produces).
      - name: Upload Qodana HTML report
        if: always() && !cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qodana-report-${{ matrix.name }}
          path: ${{ runner.temp }}/qodana/results/report/
          retention-days: 30
          if-no-files-found: warn
