name: Deploy GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Republish the site after a successful Qodana run on main so the latest
  # hosted Qodana HTML reports are available under GitHub Pages.
  workflow_run:
    workflows: ["Qodana"]
    types: [completed]
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Select source revision
        id: source
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Resolve Qodana artifact source run
        id: qodana_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response_file="$(mktemp)"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/qodana_code_quality.yml/runs?branch=main&status=completed&per_page=20" \
            -o "$response_file"

          resolved="$(python - "$response_file" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding='utf-8') as handle:
              data = json.load(handle)

          for run in data.get('workflow_runs', []):
              if run.get('conclusion') == 'success':
                  print(f"run_id={run['id']}")
                  print(f"head_sha={run['head_sha']}")
                  break
          PY
          )"

          if [[ -n "$resolved" ]]; then
            printf '%s\n' "$resolved" >> "$GITHUB_OUTPUT"
          else
            echo "No successful Qodana workflow run on main was found; GitHub Pages will publish without hosted Qodana reports."
          fi

      - name: Download Qodana report (services-java)
        if: steps.qodana_source.outputs.run_id != ''
        uses: actions/download-artifact@v5
        with:
          name: qodana-report-services-java
          path: ./.qodana-pages/services-java
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Qodana report (orchestrator)
        if: steps.qodana_source.outputs.run_id != ''
        uses: actions/download-artifact@v5
        with:
          name: qodana-report-orchestrator
          path: ./.qodana-pages/orchestrator
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Qodana reports into the Pages site
        shell: bash
        run: |
          mkdir -p ./_site/qodana

          services_link='<li>services-java report is not available yet.</li>'
          orchestrator_link='<li>orchestrator report is not available yet.</li>'
          report_metadata='<p>No successful Qodana report has been published to GitHub Pages yet.</p>'

          if [[ -d ./.qodana-pages/services-java ]]; then
            mkdir -p ./_site/qodana/services-java
            cp -a ./.qodana-pages/services-java/. ./_site/qodana/services-java/
            services_link='<li><a href="./services-java/">services-java report</a></li>'
          fi

          if [[ -d ./.qodana-pages/orchestrator ]]; then
            mkdir -p ./_site/qodana/orchestrator
            cp -a ./.qodana-pages/orchestrator/. ./_site/qodana/orchestrator/
            orchestrator_link='<li><a href="./orchestrator/">orchestrator report</a></li>'
          fi

          if [[ -n "${{ steps.qodana_source.outputs.run_id }}" ]]; then
            report_metadata="<p>This page currently hosts reports from workflow run <code>${{ steps.qodana_source.outputs.run_id }}</code> for commit <code>${{ steps.qodana_source.outputs.head_sha }}</code>.</p>"
          fi

          cat > ./_site/qodana/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Qodana reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem auto; max-width: 52rem; line-height: 1.6; padding: 0 1rem; }
              code { background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 0.25rem; }
            </style>
          </head>
          <body>
            <h1>Qodana reports</h1>
            <p>Latest published reports from the GitHub Actions <code>Qodana</code> workflow on <code>main</code>.</p>
            <ul>
              ${services_link}
              ${orchestrator_link}
            </ul>
            ${report_metadata}
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
