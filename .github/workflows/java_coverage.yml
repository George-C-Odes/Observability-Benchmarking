name: Java Coverage

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/java_coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'services/java/**'
      - 'utils/orchestrator/**'
      - '.github/workflows/java_coverage.yml'

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: spring-tomcat
            module_dir: services/java/spring/jvm/tomcat
          - name: spring-netty
            module_dir: services/java/spring/jvm/netty
          - name: quarkus-jvm
            module_dir: services/java/quarkus/jvm
          - name: micronaut-jvm
            module_dir: services/java/micronaut/jvm
          - name: helidon-se-jvm
            module_dir: services/java/helidon/se/jvm
          - name: helidon-mp-jvm
            module_dir: services/java/helidon/mp/jvm
          - name: spark-jvm
            module_dir: services/java/spark/jvm
          - name: javalin-jvm
            module_dir: services/java/javalin/jvm
          - name: dropwizard-jvm
            module_dir: services/java/dropwizard/jvm
          - name: vertx-jvm
            module_dir: services/java/vertx/jvm
          - name: pekko-jvm
            module_dir: services/java/pekko/jvm
          - name: orchestrator
            module_dir: utils/orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: |
            services/java/**/jvm/**/pom.xml
            utils/orchestrator/pom.xml

      - name: Run tests with coverage
        id: build
        continue-on-error: true
        working-directory: ${{ matrix.module_dir }}
        run: mvn verify -B -q -Dcheckstyle.skip=true

      # ── Parse JaCoCo XML and write GitHub Step Summary ──
      - name: Generate coverage summary
        if: always() && !cancelled()
        shell: bash
        env:
          MODULE_NAME: ${{ matrix.name }}
          MODULE_DIR: ${{ matrix.module_dir }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          JACOCO_XML="${MODULE_DIR}/target/site/jacoco/jacoco.xml"

          if [[ ! -f "$JACOCO_XML" ]]; then
            echo "::warning::JaCoCo report not found at $JACOCO_XML"
            echo "### ⚠️ Coverage: ${MODULE_NAME}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No JaCoCo report was generated. Tests may have been skipped or failed before the report phase." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Extract the report-level aggregate counters from the JaCoCo XML.
          # In JaCoCo's output the last <counter> of each type belongs to the
          # top-level <report> element (after all <package> elements).
          # We use grep -oP (GNU grep PCRE, pre-installed on Ubuntu runners)
          # which is portable — mawk (the default awk on ubuntu-latest) does
          # NOT support gawk-style match() capture groups.
          parse_counter() {
            local type="$1"
            local line
            line=$(grep "type=\"${type}\"" "$JACOCO_XML" | tail -1)
            local missed covered
            missed=$(echo "$line" | grep -oP 'missed="\K[0-9]+')
            covered=$(echo "$line" | grep -oP 'covered="\K[0-9]+')
            echo "${missed:-0} ${covered:-0}"
          }

          read -r inst_missed inst_covered   <<< "$(parse_counter INSTRUCTION)"
          read -r br_missed br_covered       <<< "$(parse_counter BRANCH)"
          read -r line_missed line_covered   <<< "$(parse_counter LINE)"
          read -r method_missed method_covered <<< "$(parse_counter METHOD)"

          pct() {
            local missed=$1 covered=$2
            local total=$((missed + covered))
            if [[ $total -eq 0 ]]; then echo "—"; return; fi
            echo "scale=1; $covered * 100 / $total" | bc
          }

          inst_pct=$(pct "$inst_missed" "$inst_covered")
          br_pct=$(pct "$br_missed" "$br_covered")
          line_pct=$(pct "$line_missed" "$line_covered")
          method_pct=$(pct "$method_missed" "$method_covered")

          # Determine threshold check status
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            CHECK_BADGE="✅ Thresholds passed"
          else
            CHECK_BADGE="⚠️ Threshold check failed (soft gate — not blocking)"
          fi

          {
            echo "### 📊 Coverage: ${MODULE_NAME}"
            echo ""
            echo "**${CHECK_BADGE}** · Minimum: 15% line, 10% branch"
            echo ""
            echo "| Metric       | Covered | Missed | Total | Coverage |"
            echo "|--------------|--------:|-------:|------:|---------:|"
            echo "| Instructions | ${inst_covered} | ${inst_missed} | $((inst_covered + inst_missed)) | ${inst_pct}% |"
            echo "| Branches     | ${br_covered} | ${br_missed} | $((br_covered + br_missed)) | ${br_pct}% |"
            echo "| Lines        | ${line_covered} | ${line_missed} | $((line_covered + line_missed)) | ${line_pct}% |"
            echo "| Methods      | ${method_covered} | ${method_missed} | $((method_covered + method_missed)) | ${method_pct}% |"
            echo ""
            echo "> Report generated from \`${JACOCO_XML}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-java-${{ matrix.name }}
          path: |
            ${{ matrix.module_dir }}/target/site/jacoco/
          retention-days: 30
          if-no-files-found: warn

