version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - revive
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - unused
    - gosec
    - unconvert

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec