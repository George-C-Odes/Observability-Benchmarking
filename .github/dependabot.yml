# Keep GitHub Actions, Ruby gems, and Python packages up to date.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Ruby / Jekyll (docs site)
  - package-ecosystem: bundler
    directory: /docs
    schedule:
      interval: weekly
    commit-message:
      prefix: "docs"

  # Python / Django services
  - package-ecosystem: pip
    directory: /services/python/django/gunicorn/common
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: pip
    directory: /services/python/django/gunicorn/WSGI
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: pip
    directory: /services/python/django/gunicorn/ASGI
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(python)"

