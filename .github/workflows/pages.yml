name: Deploy GitHub Pages

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main

  # Republish after main-branch quality runs so hosted reports stay current.
  # Go Quality and CodeQL always upload their report artifacts (even on
  # failure).  We listen for any completed run, but jobs only proceed on
  # successful workflows, except that Go Quality and CodeQL failures are
  # also accepted so their reports remain current.
  workflow_run:
    workflows:
      - Qodana
      - Next.js Dashboard Quality
      - Django Python Quality
      - Go Quality
      - CodeQL
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Keep only one Pages deployment active at a time without interrupting the run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Run for push / dispatch unconditionally.
    # For workflow_run: accept Go Quality and CodeQL success or failure
    # (reports are always uploaded), but require success for every other
    # triggering workflow.
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
      || (github.event.workflow_run.name == 'Go Quality'
          && github.event.workflow_run.conclusion == 'failure')
      || (github.event.workflow_run.name == 'CodeQL'
          && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Select source revision
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            echo "ref=$WR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$PUSH_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          working-directory: docs

      - name: Set up Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site with Bundler and Jekyll
        shell: bash
        working-directory: ./docs
        env:
          JEKYLL_ENV: production
        run: |
          ruby --version

          # Ensure a Gemfile.lock is present so docs builds are reproducible.
          if [ ! -f Gemfile.lock ]; then
            echo "Error: docs/Gemfile.lock is missing. Please generate and commit it for reproducible GitHub Pages builds." >&2
            exit 1
          fi
          bundle exec jekyll build --destination ../_site

      - name: Resolve Qodana artifact source run
        id: qodana_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RESOLVE_WORKFLOW_NAME: Qodana
          RESOLVE_WORKFLOW_FILE: qodana_code_quality.yml
          RESOLVE_ACCEPTED: success
        run: bash scripts/pages/resolve-source.sh

      - name: Inspect available Qodana artifacts
        id: qodana_artifacts
        if: steps.qodana_source.outputs.run_id != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
        run: bash scripts/pages/inspect-qodana-artifacts.sh

      - name: Download Qodana report (services-java)
        id: download_qodana_services_java
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-services-java
          path: ./.qodana-pages/services-java
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Qodana report (orchestrator)
        id: download_qodana_orchestrator
        if: steps.qodana_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-orchestrator
          path: ./.qodana-pages/orchestrator
          run-id: ${{ steps.qodana_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Next.js Dashboard quality report (ESLint + TypeScript)
      # ----------------------------------------------------------------

      - name: Resolve Next.js quality artifact source run
        id: nextjs_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RESOLVE_WORKFLOW_NAME: Next.js Dashboard Quality
          RESOLVE_WORKFLOW_FILE: nextjs_dash_quality.yml
          RESOLVE_ACCEPTED: success
        run: bash scripts/pages/resolve-source.sh

      - name: Download Next.js quality report
        id: download_nextjs_quality
        if: steps.nextjs_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: quality-report-nextjs-dash
          path: ./.nextjs-quality-pages/nextjs-dash
          run-id: ${{ steps.nextjs_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Django Python quality report (Qodana Python Community)
      # ----------------------------------------------------------------

      - name: Resolve Django Python quality artifact source run
        id: django_python_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RESOLVE_WORKFLOW_NAME: Django Python Quality
          RESOLVE_WORKFLOW_FILE: django_python_quality.yml
          RESOLVE_ACCEPTED: success
        run: bash scripts/pages/resolve-source.sh

      - name: Download Django Python quality report
        id: download_django_python_quality
        if: steps.django_python_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: qodana-report-django-python
          path: ./.django-python-quality-pages/django-python
          run-id: ${{ steps.django_python_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Go quality report (golangci-lint)
      # ----------------------------------------------------------------

      - name: Resolve Go quality artifact source run
        id: go_quality_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RESOLVE_WORKFLOW_NAME: Go Quality
          RESOLVE_WORKFLOW_FILE: go_quality.yml
          RESOLVE_ACCEPTED: success,failure
        run: bash scripts/pages/resolve-source.sh

      - name: Download Go quality report
        id: download_go_quality
        if: steps.go_quality_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: quality-report-go
          path: ./.go-quality-pages/go
          run-id: ${{ steps.go_quality_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # CodeQL security & quality report
      # ----------------------------------------------------------------

      - name: Resolve CodeQL artifact source run
        id: codeql_source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RESOLVE_WORKFLOW_NAME: CodeQL
          RESOLVE_WORKFLOW_FILE: codeql.yml
          RESOLVE_ACCEPTED: success,failure
        run: bash scripts/pages/resolve-source.sh

      - name: Download CodeQL quality report
        id: download_codeql_quality
        if: steps.codeql_source.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: quality-report-codeql
          path: ./.codeql-quality-pages/codeql
          run-id: ${{ steps.codeql_source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble quality pages
        shell: bash
        env:
          SERVICES_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.services_java_present }}
          ORCHESTRATOR_ARTIFACT_PRESENT: ${{ steps.qodana_artifacts.outputs.orchestrator_present }}
          SERVICES_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_services_java.outcome }}
          ORCHESTRATOR_DOWNLOAD_OUTCOME: ${{ steps.download_qodana_orchestrator.outcome }}
          QODANA_RUN_ID: ${{ steps.qodana_source.outputs.run_id }}
          QODANA_HEAD_SHA: ${{ steps.qodana_source.outputs.head_sha }}
          QODANA_PAGES_DIR: ./.qodana-pages
          NEXTJS_QUALITY_RUN_ID: ${{ steps.nextjs_quality_source.outputs.run_id }}
          NEXTJS_QUALITY_HEAD_SHA: ${{ steps.nextjs_quality_source.outputs.head_sha }}
          NEXTJS_DOWNLOAD_OUTCOME: ${{ steps.download_nextjs_quality.outcome }}
          NEXTJS_QUALITY_PAGES_DIR: ./.nextjs-quality-pages
          DJANGO_PYTHON_QUALITY_RUN_ID: ${{ steps.django_python_quality_source.outputs.run_id }}
          DJANGO_PYTHON_QUALITY_HEAD_SHA: ${{ steps.django_python_quality_source.outputs.head_sha }}
          DJANGO_PYTHON_DOWNLOAD_OUTCOME: ${{ steps.download_django_python_quality.outcome }}
          DJANGO_PYTHON_QUALITY_PAGES_DIR: ./.django-python-quality-pages
          GO_QUALITY_RUN_ID: ${{ steps.go_quality_source.outputs.run_id }}
          GO_QUALITY_HEAD_SHA: ${{ steps.go_quality_source.outputs.head_sha }}
          GO_DOWNLOAD_OUTCOME: ${{ steps.download_go_quality.outcome }}
          GO_QUALITY_PAGES_DIR: ./.go-quality-pages
          CODEQL_QUALITY_RUN_ID: ${{ steps.codeql_source.outputs.run_id }}
          CODEQL_QUALITY_HEAD_SHA: ${{ steps.codeql_source.outputs.head_sha }}
          CODEQL_DOWNLOAD_OUTCOME: ${{ steps.download_codeql_quality.outcome }}
          CODEQL_QUALITY_PAGES_DIR: ./.codeql-quality-pages
          SITE_DIR: ./_site
        run: bash scripts/pages/assemble-quality-pages.sh

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4

  # Deployment job
  # No explicit `if` needed — `needs: build` already ensures this job only
  # runs when the build job succeeds (which has its own workflow_run gate).
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
