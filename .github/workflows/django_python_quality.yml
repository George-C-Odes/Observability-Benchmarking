name: Django Python Quality

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/python/django/**'
      - '.github/workflows/django_python_quality.yml'
  push:
    branches:
      - main
    paths:
      - 'services/python/django/**'
      - '.github/workflows/django_python_quality.yml'

permissions:
  contents: read

jobs:
  common:
    name: Django common checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            services/python/django/gunicorn/common/pyproject.toml
            services/python/django/gunicorn/WSGI/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/python/django/gunicorn/WSGI/requirements-dev.txt

      - name: Syntax check
        working-directory: services/python/django/gunicorn/common
        run: python -m compileall src

      - name: Lint
        working-directory: services/python/django/gunicorn/common
        run: python -m ruff check .

      - name: Format check
        working-directory: services/python/django/gunicorn/common
        run: python -m ruff format --check .

  modules:
    name: Django module checks (${{ matrix.module_name }})
    needs: common
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OTEL_SDK_DISABLED: 'true'
      PYROSCOPE_ENABLED: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_name: django-platform
            module_dir: services/python/django/gunicorn/WSGI
          - module_name: django-reactive
            module_dir: services/python/django/gunicorn/ASGI
    defaults:
      run:
        working-directory: ${{ matrix.module_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            services/python/django/gunicorn/common/pyproject.toml
            ${{ matrix.module_dir }}/requirements.txt
            ${{ matrix.module_dir }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ../common -r requirements.txt -r requirements-dev.txt

      - name: Syntax check
        run: python -m compileall manage.py hello_project gunicorn.conf.py

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Django system checks
        run: python manage.py check

      - name: Unit tests
        run: python manage.py test obbench_django_common.tests