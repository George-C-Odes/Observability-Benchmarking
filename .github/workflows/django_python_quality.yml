name: Django Python Quality

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/python/django/**'
      - '.github/workflows/django_python_quality.yml'
  push:
    branches:
      - main
    paths:
      - 'services/python/django/**'
      - '.github/workflows/django_python_quality.yml'
  schedule:
    # Weekly scan — Monday at 06:30 UTC (staggered after Next.js at 06:15).
    - cron: '30 6 * * 1'

permissions:
  contents: read

jobs:
  common:
    name: Django common checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            services/python/django/gunicorn/common/pyproject.toml
            services/python/django/gunicorn/WSGI/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/python/django/gunicorn/WSGI/requirements-dev.txt

      - name: Syntax check
        working-directory: services/python/django/gunicorn/common
        run: python -m compileall src

      - name: Print Ruff version
        working-directory: services/python/django/gunicorn/common
        run: python -m ruff --version

      - name: Lint
        working-directory: services/python/django/gunicorn/common
        run: python -m ruff check .

      - name: Format check
        working-directory: services/python/django/gunicorn/common
        run: python -m ruff format --check .

  modules:
    name: Django module checks (${{ matrix.module_name }})
    needs: common
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OTEL_SDK_DISABLED: 'true'
      PYROSCOPE_ENABLED: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_name: django-platform
            module_dir: services/python/django/gunicorn/WSGI
          - module_name: django-reactive
            module_dir: services/python/django/gunicorn/ASGI
    defaults:
      run:
        working-directory: ${{ matrix.module_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            services/python/django/gunicorn/common/pyproject.toml
            ${{ matrix.module_dir }}/requirements.txt
            ${{ matrix.module_dir }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ../common -r requirements.txt -r requirements-dev.txt

      - name: Syntax check
        run: python -m compileall manage.py hello_project gunicorn.conf.py

      - name: Print Ruff version
        run: python -m ruff --version

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Django system checks
        run: python manage.py check

      - name: Unit tests
        run: python manage.py test obbench_django_common.tests --verbosity=2

  qodana:
    name: Qodana Python (Django)
    needs: common
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The Qodana job is allowed to fail without blocking the overall workflow
    # so the HTML report artifact is still uploaded and the Pages deployment
    # can download it. The job itself shows as failed (yellow) in the Actions
    # UI when the quality gate is violated, keeping the signal visible.
    # Remove this once the codebase is clean or a reviewed baseline is in place.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Qodana Python Community Scan
        env:
          RESULTS_DIR: ${{ runner.temp }}/qodana-python/results
        run: |
          mkdir -p "$RESULTS_DIR"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/data/project" \
            -v "$RESULTS_DIR:/data/results" \
            jetbrains/qodana-python-community:2025.3 \
            --project-dir=/data/project \
            --config=/data/project/services/python/django/qodana.yaml \
            --only-directory=services/python/django \
            --results-dir=/data/results

      # Explicit upload of the HTML report directory so the Pages workflow
      # can download and host it alongside the JVM and Next.js reports.
      - name: Upload Qodana HTML report
        if: always() && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qodana-report-django-python
          path: ${{ runner.temp }}/qodana-python/results/report/
          retention-days: 30
          if-no-files-found: warn
