name: Next.js Dashboard Coverage

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'utils/nextjs-dash/**'
      - '.github/workflows/nextjs_dash_coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'utils/nextjs-dash/**'
      - '.github/workflows/nextjs_dash_coverage.yml'

permissions:
  contents: read

jobs:
  coverage:
    name: Dashboard Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: utils/nextjs-dash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: utils/nextjs-dash/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Node-environment coverage (lib, API routes) ──────────────────
      - name: Coverage – Node environment
        id: coverage_node
        run: npx vitest run -c vitest.config.node.ts --coverage

      # ── DOM-environment coverage (components, hooks) ─────────────────
      - name: Coverage – DOM environment
        id: coverage_dom
        run: npx vitest run -c vitest.config.dom.ts --coverage

      # ── Generate GitHub Step Summary ─────────────────────────────────
      - name: Generate coverage summary
        if: always() && !cancelled()
        env:
          NODE_OUTCOME: ${{ steps.coverage_node.outcome }}
          DOM_OUTCOME: ${{ steps.coverage_dom.outcome }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          summary_file = os.environ["GITHUB_STEP_SUMMARY"]
          node_outcome = os.environ["NODE_OUTCOME"]
          dom_outcome  = os.environ["DOM_OUTCOME"]

          def load_coverage_totals(json_path):
              """Load the total coverage counters from a Vitest JSON summary."""
              if not os.path.isfile(json_path):
                  return None
              with open(json_path) as f:
                  data = json.load(f)
              return data.get("total", {})

          def parse_coverage_json(json_path, label):
              """Parse Vitest coverage-v8 JSON summary and return a markdown table."""
              if not os.path.isfile(json_path):
                  return f"**{label}**: ⚠️ No coverage report found at `{json_path}`\n\n"

              with open(json_path) as f:
                  data = json.load(f)

              total = data.get("total", {})
              rows = []
              for metric in ["lines", "statements", "functions", "branches"]:
                  info = total.get(metric, {})
                  pct    = info.get("pct", 0)
                  covered = info.get("covered", 0)
                  total_n = info.get("total", 0)
                  rows.append(f"| {metric.capitalize()} | {covered} | {total_n - covered} | {total_n} | {pct}% |")

              header  = f"#### {label}\n\n"
              header += "| Metric     | Covered | Missed | Total | Coverage |\n"
              header += "|------------|--------:|-------:|------:|---------:|\n"
              return header + "\n".join(rows) + "\n\n"

          def compute_combined_average(totals_list):
              """Compute weighted-average coverage across environments.

              Mirrors Codecov's methodology: for each metric, sum
              covered/total across all reports, then compute the
              percentage.  This is the apples-to-apples number that
              matches the Codecov dashboard.
              """
              metrics = ["lines", "statements", "functions", "branches"]
              combined = {}
              for metric in metrics:
                  sum_covered = 0
                  sum_total   = 0
                  for totals in totals_list:
                      info = totals.get(metric, {})
                      sum_covered += info.get("covered", 0)
                      sum_total   += info.get("total", 0)
                  pct = (sum_covered * 100 / sum_total) if sum_total > 0 else 0.0
                  combined[metric] = {
                      "covered": sum_covered,
                      "total":   sum_total,
                      "missed":  sum_total - sum_covered,
                      "pct":     round(pct, 2),
                  }
              return combined

          with open(summary_file, "a") as f:
              f.write("### 📊 Coverage: Next.js Dashboard\n\n")

              # Overall status
              if node_outcome == "success" and dom_outcome == "success":
                  f.write("**✅ All tests passed**\n\n")
              else:
                  parts = []
                  if node_outcome != "success":
                      parts.append("Node tests")
                  if dom_outcome != "success":
                      parts.append("DOM tests")
                  f.write(f"**⚠️ Issues detected**: {', '.join(parts)} did not succeed\n\n")

              # Parse each coverage JSON
              f.write(parse_coverage_json(
                  "coverage/node/coverage-summary.json",
                  "Node environment (lib, API routes)"))
              f.write(parse_coverage_json(
                  "coverage/dom/coverage-summary.json",
                  "DOM environment (components, hooks)"))

              # ── Combined weighted average (Codecov-comparable) ───────
              node_totals = load_coverage_totals("coverage/node/coverage-summary.json")
              dom_totals  = load_coverage_totals("coverage/dom/coverage-summary.json")
              env_totals  = [t for t in [node_totals, dom_totals] if t]

              if env_totals:
                  combined = compute_combined_average(env_totals)
                  f.write("#### 🔵 Combined weighted average (Codecov-comparable)\n\n")
                  f.write("> This row mirrors Codecov's calculation: covered ÷ total "
                          "summed across both environments.\n\n")
                  f.write("| Metric     | Covered | Missed | Total | Coverage |\n")
                  f.write("|------------|--------:|-------:|------:|---------:|\n")
                  for metric in ["lines", "statements", "functions", "branches"]:
                      c = combined[metric]
                      f.write(f"| **{metric.capitalize()}** "
                              f"| **{c['covered']}** "
                              f"| **{c['missed']}** "
                              f"| **{c['total']}** "
                              f"| **{c['pct']}%** |\n")
                  f.write("\n")

              f.write("> Reports generated by Vitest + @vitest/coverage-v8\n")
          PYEOF

      # ── Upload HTML coverage reports as artifacts ────────────────────
      - name: Upload Node coverage report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-nextjs-dash-node
          path: utils/nextjs-dash/coverage/node/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload DOM coverage report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-nextjs-dash-dom
          path: utils/nextjs-dash/coverage/dom/
          retention-days: 30
          if-no-files-found: warn

      # ── Codecov upload ───────────────────────────────────────────────
      # Upload both LCOV reports with a dedicated flag so Codecov can
      # attribute coverage to the dashboard component.
      #
      # Flag naming: nextjs-dash (consistent with the component id in
      # codecov.yml).  See codecov.yml at the repo root for flag → path
      # mappings and component definitions.
      - name: Upload to Codecov (Node)
        if: always() && !cancelled() && steps.coverage_node.outcome == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: utils/nextjs-dash/coverage/node/lcov.info
          flags: nextjs-dash-node
          name: nextjs-dash-node
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

      - name: Upload to Codecov (DOM)
        if: always() && !cancelled() && steps.coverage_dom.outcome == 'success'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: utils/nextjs-dash/coverage/dom/lcov.info
          flags: nextjs-dash-dom
          name: nextjs-dash-dom
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

