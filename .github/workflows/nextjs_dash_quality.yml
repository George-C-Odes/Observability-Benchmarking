name: Next.js Dashboard Quality

env:
  # TODO(node24-migration): Remove once GitHub's default action runtime is Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'utils/nextjs-dash/**'
      - 'scripts/pages/generate-nextjs-quality-report.mjs'
      - 'scripts/pages/report-helpers.mjs'
      - '.github/workflows/nextjs_dash_quality.yml'
  push:
    branches:
      - main
    paths:
      - 'utils/nextjs-dash/**'
      - 'scripts/pages/generate-nextjs-quality-report.mjs'
      - 'scripts/pages/report-helpers.mjs'
      - '.github/workflows/nextjs_dash_quality.yml'
  schedule:
    # Weekly scan — Monday at 06:15 UTC (staggered after Go Quality at 06:00).
    - cron: '15 6 * * 1'

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: utils/nextjs-dash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: utils/nextjs-dash/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Print tool versions
        id: versions
        run: |
          node_ver="$(node --version)"
          npm_ver="$(npm --version)"
          eslint_ver="$(npx eslint --version)"
          tsc_ver="$(npx tsc --version)"
          echo "Node $node_ver"
          echo "npm  $npm_ver"
          echo "$eslint_ver"
          echo "$tsc_ver"
          echo "node=$node_ver"       >> "$GITHUB_OUTPUT"
          echo "eslint=$eslint_ver"   >> "$GITHUB_OUTPUT"
          echo "tsc=$tsc_ver"         >> "$GITHUB_OUTPUT"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests – Node environment
        run: npm run test:node

      - name: Unit tests – DOM environment (jsdom)
        run: npm run test:dom

      - name: Production build smoke test
        run: npm run build

      # ------------------------------------------------------------------
      # Quality report: generate an HTML report from ESLint + TypeScript
      # diagnostics so the Pages workflow can host it alongside the Qodana
      # JVM reports.  Steps run with `if: always()` so that a failing lint
      # or typecheck still produces a downloadable report artifact.
      # ------------------------------------------------------------------

      - name: Generate ESLint JSON report
        if: always() && !cancelled()
        run: npx eslint . --format json --output-file eslint-report.json || true

      - name: Capture TypeScript diagnostics
        if: always() && !cancelled()
        run: npx tsc --noEmit > tsc-output.txt 2>&1 || true

      - name: Generate quality report
        if: always() && !cancelled()
        env:
          ESLINT_VERSION: ${{ steps.versions.outputs.eslint }}
          TSC_VERSION: ${{ steps.versions.outputs.tsc }}
          NODE_VERSION: ${{ steps.versions.outputs.node }}
        run: node ../../scripts/pages/generate-nextjs-quality-report.mjs

      - name: Upload quality report
        if: always() && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-report-nextjs-dash
          path: utils/nextjs-dash/quality-report/
          retention-days: 30
          if-no-files-found: warn

